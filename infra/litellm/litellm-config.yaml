# LiteLLM proxy config
#
# Students point the OpenAI SDK at this proxy and use ANY OpenAI model name.
# The wildcard route passes every request through to OpenAI proper, so
# "gpt-4o", "gpt-4o-mini", "gpt-4.1-nano", "text-embedding-3-small", the
# o-series, etc. all just work — no per-model config needed.

model_list:
  # --- Anthropic (Claude) ---
  # Students call these with the OpenAI SDK too — just pass the model name.
  # Named routes for the two blessed models:
  - model_name: claude-sonnet-4-6
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY
  - model_name: claude-haiku-4-5
    litellm_params:
      model: anthropic/claude-haiku-4-5
      api_key: os.environ/ANTHROPIC_API_KEY
  # Wildcard: any other claude-* name (e.g. a dated snapshot) passes through
  # to Anthropic. Must come BEFORE the catch-all "*" so it wins the match.
  - model_name: "claude-*"
    litellm_params:
      model: anthropic/*
      api_key: os.environ/ANTHROPIC_API_KEY

  # --- OpenAI (everything else) ---
  # Catch-all: gpt-4o, gpt-4o-mini, text-embedding-3-small, o-series, etc.
  - model_name: "*"
    litellm_params:
      model: openai/*
      api_key: os.environ/OPENAI_API_KEY

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY

litellm_settings:
  # In-memory response cache — zero infra (single Fly machine). Identical
  # requests (same model + input) return a cached response at $0, no provider
  # call. Cache hits don't draw down per-key budgets. Cleared on restart and
  # not shared across machines — fine for one always-on box. Swap type: local
  # -> redis (+ REDIS_URL secret) if you ever want it durable / multi-machine.
  cache: true
  cache_params:
    type: local
    ttl: 3600 # seconds; identical repeats within the hour hit the cache
    supported_call_types: ["completion", "acompletion", "embedding", "aembedding"]

# NOTE: Budget enforcement is per-key (set by new-cohort.sh at mint time).
# Do NOT set litellm_settings.max_budget here — that is a GLOBAL ceiling across
# all keys, and setting it to 0 makes the proxy reject every request immediately.
# (max_budget is a SEPARATE key from the cache settings above — don't merge them.)
